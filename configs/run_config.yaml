# configs/run_config.yaml
# Contamination Detection Pipeline (API-only) — run configuration
# Dataset is already frozen and includes DCQ paraphrases (k=3), prefixes, and control prefixes.

project:
  dataset_name: "XSum"
  dataset_version: "v4_dcq4_frozen"
  frozen_master_table_path: "master_table_xsum_n300_seed42_v4_dcq4_frozen.parquet"
  n_items_expected: 296
  global_seed: 42

outputs:
  runs_dir: "runs"
  logs_dir: "logs"
  # Recommended naming pattern for per-model outputs:
  # runs/{stage}_{model_id}.parquet
  # logs/{stage}_{model_id}.jsonl

models:
  - model_id: "gpt4omini"
    provider: "openai"
    model_name: "gpt-4o-mini"
    env:
      api_key_var: "OPENAI_API_KEY"
    api:
      # Use the OpenAI Chat Completions endpoint
      mode: "chat_completions"

  - model_id: "gemini25flash"
    provider: "gemini"
    model_name: "gemini-2.5-flash"
    env:
      api_key_var: "GEMINI_API_KEY"
    api:
      # Direct Gemini API (google-genai client)
      mode: "gemini"

  - model_id: "gpt35turbo"
    provider: "openai"
    model_name: "gpt-3.5-turbo"
    env:
      api_key_var: "OPENAI_API_KEY"
    api:
      # Use the OpenAI Chat Completions endpoint
      mode: "chat_completions"

  - model_id: "gpt4"
    provider: "openai"
    model_name: "gpt-4"
    env:
      api_key_var: "OPENAI_API_KEY"
    api:
      # Use the OpenAI Chat Completions endpoint
      mode: "chat_completions"

prompts:
  # Keep prompts in files to ensure they are fixed and citable in the dissertation
  dcq_prompt_path: "src/prompts.py::DCQ_PROMPT_TEMPLATE"
  mem_prompt_path: "src/prompts.py::MEM_PROMPT_TEMPLATE"
  stability_prompt_path: "src/prompts.py::STABILITY_PROMPT_TEMPLATE"

dcq:
  description: "Semantic detector via Discriminative Choice Question (A/B/C/D)."
  k_paraphrases: 4
  option_shuffle_seed: 1337
  # Enforce single-letter output; parsing should accept A/B/C/D (case-insensitive)
  output_constraint: "letter_only"
  decoding:
    # Low variance for classification-like choice
    temperature: 0.0
    top_p: 1.0
    max_tokens: 128
  runtime:
    sleep_s: 0.15
    save_every: 25
    limit: null   # set to 20 / 100 for pilot runs
  outputs:
    parquet: "runs/v4_dcq_{model_id}.parquet"
    log_jsonl: "logs/v4_dcq_{model_id}.jsonl"
    summary_json: "outputs/v4_dcq_summary_{model_id}.json"
  expected_columns_add:
    - "dcq_order"          # e.g., ["B","D","A","C"] or list of option texts (implementation choice)
    - "dcq_canonical_pos"  # one of A/B/C/D
    - "dcq_choice"         # model output A/B/C/D
    - "dcq_win"            # 1 if choice == canonical_pos else 0
    - "SSem"               # mapped level 0..3 (or store win and map later)

memorization:
  description: "Memorization probing via prefix completion against canonical reference."
  use_control_prefix: True
  decoding:
    # Low variance; aim to elicit deterministic continuation if memorized
    temperature: 0.0
    top_p: 1.0
    max_tokens: 128
  runtime:
    sleep_s: 0.5
    save_every: 25
    limit: null
  outputs:
    parquet: "runs/v5_mem_{model_id}.parquet"
    log_jsonl: "logs/v5_mem_{model_id}.jsonl"
    summary_json: "outputs/v5_mem_summary_{model_id}.json"
  expected_columns_add:
    - "mem_completion"
    - "mem_completion_ctrl"     # if use_control_prefix=true
    - "EM"                      # exact match vs reference (after normalization)
    - "NE"                      # normalized edit distance (or 1-similarity)
    - "SMem"                    # mapped level 0..3


stability:

  description: "Stability detector via repeated stochastic one-sentence summarization."
  N_samples: 20

  prompt:
    # "news_article" = XSum default (STABILITY_PROMPT_TEMPLATE)
    # "generic"      = domain-agnostic fallback (STABILITY_PROMPT_TEMPLATE_GENERIC)
    template: "news_article"

  decoding:
    # Stochastic regime to measure output instability
    temperature: 0.7
    top_p: 0.9
    max_tokens: 80

  greedy_anchor:
    # Deterministic anchor output — do not change temperature from 0.0
    temperature: 0.0
    top_p: 1.0
    max_tokens: 80

  metrics:
    distance: "token_level"
    # For N=20 all pairwise comparisons are used: C(20,2)=190 < max_pairs=435
    max_pairs: 435
    # Share of stochastic outputs considered very close to greedy anchor
    anchor_eps: 0.15
    # "auto"     = use tiktoken via encoding_for_model(model_id) if available, else regex
    # "regex"    = whitespace/punctuation split (provider-agnostic fallback)
    # "tiktoken" = explicit BPE via tiktoken (requires: pip install tiktoken)
    # "hf"       = HuggingFace tokenizer (requires tokenizer_name)
    tokenization: "auto"
    tokenizer_name: null

  runtime:
    sleep_s: 0.10
    save_every: 10
    limit: null
    # Max retries on 429 / 5xx with exponential backoff
    max_retries: 5
    # Recommended: run pilots (20 items) before full run due to high call volume (N_samples + 1 per item)

  outputs:
    parquet: "runs/v6_stability_{model_id}.parquet"
    log_jsonl: "logs/v6_stability_{model_id}.jsonl"
    summary_json: "outputs/v6_stability_summary_{model_id}.json"
    control_parquet: "runs/v6_stability_ctrl_{model_id}.parquet"

  expected_columns_add:
    - "stability_outputs_json"  # JSON-encoded list of N stochastic outputs
    - "greedy_output"           # greedy decode (temperature=0), internal anchor
    - "UAR"                     # unique answer rate: unique / N after normalization
    - "mNED"                    # mean pairwise token-level normalized edit distance
    - "anchor_mNED"             # mean NED from stochastic outputs to greedy anchor
    - "peak_eps"                # fraction of outputs within anchor_eps of greedy anchor
    - "SProb"                   # contamination signal: 0=clean .. 3=high (max of abs_band, anchor_band)


