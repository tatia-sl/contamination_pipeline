proxy_builder:
  enabled: true
  output_dir: "data/proxies"

  github_structured_out: "data/proxies/proxy_structured_github.csv"
  kaggle_structured_out: "data/proxies/proxy_structured_kaggle.csv"
  merged_out: "data/proxies/proxy_structured_merged.csv"

  # Legacy artifacts kept only for provenance and audit compatibility.
  proxy_out_txt: "data/proxies/xsum_proxy_summaries_norm_dedup_external_2026_02_06.txt"
  manifest_out_jsonl: "data/proxies/proxy_sources_manifest_external_2026_02_06.jsonl"
  summary_out_json: "outputs/proxy_build_summary_external.json"

  query_mode: "ids_and_keywords"
  id_query_cap: 40

  keywords:
    - "xsum_id"
    - "xsum dataset"
    - "huggingface xsum"
    - "bbc xsum"
    - '"document" "summary" xsum'

  extraction:
    min_tokens: 12
    max_tokens: 140
    max_periods: 4

  github:
    enabled: true
    token_env: "GITHUB_TOKEN"
    per_query_max_results: 20
    max_pages: 2
    sleep_seconds: 2.0
    rate_limit_threshold: 20
    allowed_extensions: [".txt", ".jsonl", ".json", ".csv", ".tsv"]
    deny_repo_substrings: ["tutorial", "demo", "homework", "course", "leaderboard", "benchmark-results", "model-card"]
    max_file_bytes: 1000000
    path_deny_substrings: ["eval", "evaluation", "results", "outputs", "metrics"]

  kaggle:
    enabled: true
    max_datasets: 10
    dataset_keywords: ["xsum", "bbc xsum", "news summarization xsum"]
    file_allow_extensions: [".txt", ".jsonl", ".json", ".csv", ".tsv"]
    max_file_bytes: 1000000
    sleep_seconds: 3.0
    temp_dir: "data/proxies/kaggle_tmp"
